services:
  db:
    image: postgres:17-alpine
    container_name: acquacheck_db
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acquacheck_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acquacheck_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: acquacheck_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
