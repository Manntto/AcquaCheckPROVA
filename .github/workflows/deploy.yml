name: Build → Docker Hub → Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/acquacheck-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.repository == 'Manntto/AquaCHeck'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build, Tag e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy via Docker Compose / Swarm
        run: |
          echo "✅ Imagem publicada:"
          echo "  ${{ env.IMAGE_NAME }}:latest"
          echo "  ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Para aplicar em produção (Compose):"
          echo "  IMAGE_TAG=${{ github.sha }} docker compose up -d --pull always"
          echo ""
          echo "Para aplicar em produção (Swarm Stack):"
          echo "  docker stack deploy -c docker-compose.yml acquacheck"
